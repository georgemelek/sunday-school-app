<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Background -->
  <rect width="1024" height="1024" rx="230" fill="#007AFF"/>

  <!--
    Layout: imagine a 3×3 grid of equal cells (each ~341px).
    The cross occupies the center column and center row.
    Dots sit in the four corner cells, not touching the cross bars.

    Cross bar dimensions:
      Vertical:   x=452–572, y=220–804  (width=120, height=584)
      Horizontal: x=220–804, y=452–572  (width=584, height=120)

    Dot centers sit at the midpoint of each corner quadrant:
      Gap between dot edge and nearest cross bar: ~30px
      Top-left:     center ≈ (316, 316)
      Top-right:    center ≈ (708, 316)
      Bottom-left:  center ≈ (316, 708)
      Bottom-right: center ≈ (708, 708)
  -->

  <!-- Cross -->
  <rect x="452" y="220" width="120" height="584" rx="28" fill="white"/>
  <rect x="220" y="452" width="584" height="120" rx="28" fill="white"/>

  <!-- Corner dots (in the four quadrant spaces between the arms) -->
  <circle cx="316" cy="316" r="42" fill="white" opacity="0.45"/>
  <circle cx="708" cy="316" r="42" fill="white" opacity="0.45"/>
  <circle cx="316" cy="708" r="42" fill="white" opacity="0.45"/>
  <circle cx="708" cy="708" r="42" fill="white" opacity="0.45"/>
</svg>
